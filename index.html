<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f3ef;--surface:#fff;--border:rgba(0,0,0,0.10);--text:#1a1a18;--muted:#888884;--red:#E51837}
html,body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);height:100%;height:100dvh;overflow:hidden}
body{display:flex;flex-direction:column}

/* City tabs */
#city-tabs{display:flex;align-items:stretch;background:#1a1a18;flex-shrink:0;height:48px;overflow-x:auto;scrollbar-width:none}
#city-tabs::-webkit-scrollbar{display:none}
.city-tab{font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;padding:0 22px;border:none;background:transparent;color:rgba(255,255,255,0.38);cursor:pointer;transition:all 0.15s;white-space:nowrap;position:relative;display:flex;align-items:center;flex-shrink:0}
.city-tab:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.05)}
.city-tab.active{color:#fff;background:var(--red)}
.city-tab-divider{width:1px;background:rgba(255,255,255,0.12);margin:10px 0;flex-shrink:0}

/* Header */
header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:stretch;min-height:52px;overflow:hidden}
.header-left{display:flex;align-items:center;gap:12px;border-right:1px solid var(--border);padding:0 16px;flex-shrink:0}
.header-title{font-size:12px;font-weight:400;color:var(--muted);white-space:nowrap}
.header-title em{font-style:italic;color:var(--text)}

/* Filter bar — scrollable on mobile */
#filter-bar{display:flex;align-items:stretch;flex:1;overflow-x:auto;scrollbar-width:none;min-width:0}
#filter-bar::-webkit-scrollbar{display:none}
.filter-btn{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:0 13px;border:none;border-right:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:background 0.1s,color 0.1s;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.filter-btn:hover{background:var(--bg);color:var(--text)}
.filter-btn.active{background:var(--text);color:#fff}
.filter-btn.active .dot{opacity:0.55}
.filter-btn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Header right */
.header-right{display:flex;align-items:center;gap:12px;padding:0 14px;border-left:1px solid var(--border);flex-shrink:0}
#spot-count{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);white-space:nowrap;letter-spacing:0.04em}
#locate-btn{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;gap:6px;background:var(--text);color:#fff;border:none;padding:7px 13px;cursor:pointer;transition:opacity 0.15s;white-space:nowrap}
#locate-btn:hover{opacity:0.8}
#locate-btn.active{background:#2A7FC0}

/* Map */
#map{flex:1;min-height:0}
.location-dot-outer{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.location-dot{width:14px;height:14px;background:#2A7FC0;border-radius:50%;border:2.5px solid white;box-shadow:0 0 0 0 rgba(42,127,192,0.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(42,127,192,0.45)}70%{box-shadow:0 0 0 10px rgba(42,127,192,0)}100%{box-shadow:0 0 0 0 rgba(42,127,192,0)}}

/* Mobile overrides */
@media(max-width:600px){
  .city-tab{font-size:12px;padding:0 16px}
  .header-left{padding:0 12px;gap:10px}
  .header-title{display:none}
  .filter-btn{font-size:10px;padding:0 10px;gap:5px}
  #spot-count{display:none}
  #locate-btn{font-size:11px;padding:6px 10px}
  #locate-btn .locate-label{display:none}
}

/* Leaflet */
.leaflet-popup-content-wrapper{padding:0!important;border-radius:0!important;border:1px solid rgba(0,0,0,0.13)!important;box-shadow:0 10px 36px rgba(0,0,0,0.13)!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;line-height:1!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{top:11px!important;right:13px!important;font-size:16px!important;color:var(--muted)!important;width:20px!important;height:20px!important;line-height:18px!important;z-index:10}
.leaflet-control-zoom{border:1px solid var(--border)!important;border-radius:0!important;box-shadow:none!important;overflow:hidden}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-bottom-color:var(--border)!important;font-size:16px!important;font-weight:300!important;border-radius:0!important;width:36px!important;height:36px!important;line-height:34px!important}
.leaflet-control-zoom a:hover{background:var(--bg)!important}
.leaflet-control-attribution{font-family:"DM Mono",monospace!important;font-size:9px!important;background:rgba(245,243,239,0.85)!important;border-radius:0!important;color:var(--muted)!important}

/* Popups — full width on mobile */
.popup-inner{font-family:"DM Sans",sans-serif;min-width:240px;max-width:300px;background:var(--surface)}
@media(max-width:600px){
  .popup-inner{min-width:260px;max-width:88vw}
}
.popup-header{padding:13px 16px 11px;border-bottom:1px solid rgba(0,0,0,0.07)}
.popup-name{font-size:13px;font-weight:500;color:var(--text);padding-right:18px;line-height:1.3;margin-bottom:3px}
.popup-address{font-family:"DM Mono",monospace;font-size:9px;color:var(--muted);line-height:1.5;letter-spacing:0.03em;text-transform:uppercase;margin-bottom:7px}
.popup-maps-link{display:inline-flex;align-items:center;gap:4px;font-family:"DM Mono",monospace;font-size:9px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;text-decoration:none;color:var(--text);border-bottom:1px solid var(--text);padding-bottom:1px;transition:opacity 0.12s}
.popup-maps-link:hover{opacity:0.45}
.popup-recs{padding:10px 16px 13px;display:flex;flex-direction:column;gap:9px}
.rec-row{display:flex;align-items:flex-start;gap:10px}
.rec-avatar{width:26px;height:26px;min-width:26px;display:flex;align-items:center;justify-content:center;font-family:"DM Mono",monospace;font-size:8px;font-weight:500;letter-spacing:0.03em;margin-top:2px;flex-shrink:0}
.rec-info{display:flex;flex-direction:column;gap:2px}
.rec-who{font-size:11.5px;font-weight:500;color:var(--text)}
.rec-dish{font-size:11px;color:var(--muted);font-style:italic;line-height:1.4}
.popup-office{display:flex;align-items:center;gap:12px;padding:13px 36px 13px 16px}
.office-sq{width:30px;height:30px;min-width:30px;background:#1a1a18;display:flex;align-items:center;justify-content:center}

    <path d="M15 4 Q16 2 15 0" stroke="#ff6020" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.65"/>`,

  Indonesian: (c) => `
    <ellipse cx="14" cy="21" rx="9" ry="3.5" fill="#5a8a40"/>

function cuisinePin(cuisine, color) {
  const iconFn = CUISINE_ICONS[cuisine];
  const inner = iconFn ? iconFn(color) : `<circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="46" viewBox="0 0 36 46" style="display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,0.28))">
    <path d="M18 0C9.16 0 2 7.16 2 16c0 12.25 16 30 16 30S34 28.25 34 16C34 7.16 26.84 0 18 0z" fill="${color}"/>
    <circle cx="18" cy="16" r="13" fill="white" opacity="0.18"/>
    <g transform="translate(4,2)">${inner}</g>
  </svg>`;
}
const officeIconDef = L.divIcon({
  html:'<div style="width:32px;height:32px;background:#1a1a18;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.25)">'
    +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3L21 10.5V21H15V15H9V21H3V10.5Z" fill="white"/></svg></div>',
  className:'',iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-20]
});

// ── Popup builders ────────────────────────────────────────────────────────────
function spotPopup(spot){
  const recs = spot.recs.map(r=>{
    const col=PERSON_COLORS[r.who]||'#888', init=INITIALS[r.who]||r.who.slice(0,2).toUpperCase();
    return '<div class="rec-row"><div class="rec-avatar" style="background:'+col+'18;color:'+col+';border:1px solid '+col+'30">'+init+'</div>'
      +'<div class="rec-info"><span class="rec-who">'+r.who+'</span><span class="rec-dish">'+r.dish+'</span></div></div>';
  }).join('');
  return '<div class="popup-inner"><div class="popup-header">'
    +'<div class="popup-name">'+spot.name+'</div>'
    +'<div class="popup-address">'+spot.address+'</div>'
    +'<a class="popup-maps-link" href="'+spot.maps+'" target="_blank" rel="noopener">'
    +'<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 13L13 3M13 3H6M13 3V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    +'Open in Maps</a></div><div class="popup-recs">'+recs+'</div></div>';
}
function officePopup(o){
  return '<div class="popup-inner"><div class="popup-office">'
    +'<div class="office-sq"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3L21 10.5V21H15V15H9V21H3V10.5Z" fill="white"/></svg></div>'
    +'<div class="popup-office-text"><div class="popup-name">'+o.name+'</div>'
    +'<div class="popup-address">'+o.address+'</div></div></div></div>';
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentCity='sydney', markers=[], officeMarker=null;

function renderMarkers(activeCuisine){
  markers.forEach(m=>map.removeLayer(m));
  if(officeMarker){map.removeLayer(officeMarker);officeMarker=null;}
  markers=[];

  if(OFFICES[currentCity]){
    const o=OFFICES[currentCity];
    officeMarker=L.marker([o.lat,o.lng],{icon:officeIconDef,zIndexOffset:1000})
      .addTo(map).bindPopup(officePopup(o),{maxWidth:300,className:''});
  }

  const spots=SPOTS[currentCity]||[];
  let shown=0;
  spots.forEach(spot=>{
    if(activeCuisine!=='all' && spot.cuisine!==activeCuisine) return;
    shown++;
    const color=CUISINE_COLORS[spot.cuisine]||'#888';
    const icon=L.divIcon({html:cuisinePin(spot.cuisine,color),className:'',iconSize:[36,46],iconAnchor:[18,46],popupAnchor:[0,-50]});
    const m=L.marker([spot.lat,spot.lng],{icon})
      .addTo(map).bindPopup(spotPopup(spot),{maxWidth:320,className:''});
    markers.push(m);
  });
  document.getElementById('spot-count').textContent=shown+(shown===1?' spot':' spots');
}

function buildFilterBar(city){
  const keys=CITY_CUISINES[city]||['all'];
  const bar=document.getElementById('filter-bar');
  bar.innerHTML='';
  keys.forEach(key=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(key==='all'?' active':'');
    btn.onclick=function(){filterCuisine(key,this);};
    const color=CUISINE_COLORS[key];
    const label=key==='all'?'All':key==='Noodles'?'Noodles &amp; Dumplings':key;
    btn.innerHTML=color?'<span class="dot" style="background:'+color+'"></span>'+label:label;
    bar.appendChild(btn);
  });
}

window.filterCuisine=function(cuisine,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers(cuisine);
};

window.switchCity=function(city,btn){
  currentCity=city;
  document.querySelectorAll('.city-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('city-label').textContent=CITY_LABELS[city];
  const v=CITY_VIEWS[city];
  map.setView([v[0],v[1]],v[2]);
  buildFilterBar(city);
  renderMarkers('all');
};

// ── Geolocation ──────────────────────────────────────────────────────────────
let locationMarker = null;

window.locateMe = function() {
  const btn = document.getElementById('locate-btn');
  if (!navigator.geolocation) {
    alert('Geolocation is not supported by your browser.');
    return;
  }
  btn.textContent = '...';
  btn.classList.add('active');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      if (locationMarker) map.removeLayer(locationMarker);
      const dotIcon = L.divIcon({
        html: '<div class="location-dot-outer"><div class="location-dot"></div></div>',
        className: '',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      });
      locationMarker = L.marker([lat, lng], {icon: dotIcon, zIndexOffset: 2000}).addTo(map);
      map.setView([lat, lng], 16);
      btn.textContent = '◎';
      btn.title = 'Update my location';
    },
    function(err) {
      btn.textContent = '◎';
      btn.classList.remove('active');
      alert('Could not get your location. Please allow location access in your browser settings.');
    },
    {enableHighAccuracy: true, timeout: 10000}
  );
};

// ── Init ──────────────────────────────────────────────────────────────────────
buildFilterBar('sydney');
renderMarkers('all');
</script>
